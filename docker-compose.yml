version: "3.8"
services:
  kernel:
    build: .
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - VAOS_KERNEL_MODE=sync
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      retries: 3

  kernel-with-db:
    build: .
    ports:
      - "8081:8080"
      - "50052:50051"
    environment:
      - VAOS_KERNEL_MODE=db-sync
      - VAOS_DB_DSN=host=postgres user=vaos password=vaos dbname=vaos_kernel sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: vaos
      POSTGRES_PASSWORD: vaos
      POSTGRES_DB: vaos_kernel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaos"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
