syntax = "proto3";

package vaos.kernel.swarm.v1;

option go_package = "vaos-kernel/internal/grpc/gen/swarmv1";

message SwarmIntentRequest {
  string agent_id = 1;
  string token = 2;
  string action = 3;
  string resource = 4;
  map<string, string> parameters = 5;
}

message SwarmIntentResponse {
  string execution_id = 1;
  string status = 2;
  string detail = 3;
}

service SwarmService {
  rpc ExecuteIntent(SwarmIntentRequest) returns (SwarmIntentResponse);
}

