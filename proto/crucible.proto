syntax = "proto3";

package vaos.kernel.crucible.v1;

option go_package = "vaos-kernel/internal/grpc/gen/cruciblev1";

message CrucibleTaskRequest {
  string agent_id = 1;
  string token = 2;
  string action = 3;
  string resource = 4;
  map<string, string> parameters = 5;
}

message CrucibleTaskResponse {
  string execution_id = 1;
  string status = 2;
  string attestation = 3;
}

service CrucibleService {
  rpc ExecuteTask(CrucibleTaskRequest) returns (CrucibleTaskResponse);
}

